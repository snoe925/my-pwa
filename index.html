<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Manager</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 16px; }
    h1 { color: #333; }
    .input-area { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="url"] { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-add { background: #007bff; color: white; }
    .btn-delete { background: #dc3545; color: white; margin-top: 12px; }
    .btn-delete:disabled { background: #ccc; cursor: not-allowed; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 8px; }
    li:hover { background: #f8f9fa; }
    input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    .url-text { flex: 1; word-break: break-all; }
    .empty-message { color: #666; text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <h1>URL Manager</h1>
  
  <div class="input-area">
    <input type="url" id="urlInput" placeholder="https://example.com" required />
    <button class="btn-add" id="addBtn">Add URL</button>
  </div>

  <ul id="urlList"></ul>
  <p id="emptyMessage" class="empty-message">No URLs saved yet</p>

  <button class="btn-delete" id="deleteBtn" disabled>Delete Selected</button>

  <script src="url-store.js"></script>
  <script>
    const urlInput = document.getElementById('urlInput');
    const addBtn = document.getElementById('addBtn');
    const urlList = document.getElementById('urlList');
    const emptyMessage = document.getElementById('emptyMessage');
    const deleteBtn = document.getElementById('deleteBtn');
    let urls = [];

    async function init() {
      urls = await URLStore.getAll();
      renderList();
    }

    function renderList() {
      urlList.innerHTML = '';
      
      if (urls.length === 0) {
        emptyMessage.style.display = 'block';
        deleteBtn.disabled = true;
        return;
      }

      emptyMessage.style.display = 'none';
      deleteBtn.disabled = true;

      urls.forEach(url => {
        const li = document.createElement('li');
        li.innerHTML = `
          <input type="checkbox" class="url-checkbox" data-id="${url.id}">
          <span class="url-text">${url.url}</span>
        `;
        urlList.appendChild(li);
      });

      updateDeleteButton();
    }

    function updateDeleteButton() {
      const checked = document.querySelectorAll('.url-checkbox:checked').length;
      deleteBtn.disabled = checked === 0;
    }

    addBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) return;

      const validUrl = url.startsWith('http://') || url.startsWith('https://') ? url : 'https://' + url;
      
      await URLStore.add(validUrl);
      urls = await URLStore.getAll();
      renderList();
      urlInput.value = '';
      urlInput.focus();
    });

    urlList.addEventListener('change', (e) => {
      if (e.target.classList.contains('url-checkbox')) {
        updateDeleteButton();
      }
    });

    deleteBtn.addEventListener('click', async () => {
      const checkboxes = document.querySelectorAll('.url-checkbox:checked');
      const idsToDelete = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
      
      for (const id of idsToDelete) {
        await URLStore.delete(id);
      }
      
      urls = await URLStore.getAll();
      renderList();
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }

    init();
  </script>
</body>
</html>
